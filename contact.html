<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>contact us</title>
</head>
<body>
    <section class="contact">
        <div class="container">
            <h2>
                Contact Us
            </h2>
            <div class="contact-wrapper">
                <div class="contact-form">
                    <h3>Get In Touch</h3>
                    <form>
                        <div class="form-group">
                            <input type="text" name="name" placeholder="Your Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" name="email" placeholder="Your Email" required>
                        </div>
                        <div class="form-group">
                            <textarea name="message" placeholder="Your Message" required></textarea>
                        </div>
                        <button type="submit">Send Message</button>
                    </form>
                </div>
                <div class="contact-info">
                    <h3>Contact Information</h3>
                    <p><i class="fas fa-map-marker-alt"></i><strong>Address: </strong> 149 Neslon Street, Auckland, New Zealand</p>
                    <p><i class="fas fa-phone"></i><strong>Phone: </strong> +64 552 0604</p>
                    <p><i class="fas fa-envelope"></i><strong>Email: </strong> s&ysports@gmail.com</p>
                </div>
            </div>
        </div>
    </section>
    
</body>
</html>
